<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Guessing Game</title>
    <link href="style.css" rel="stylesheet" />
    <link
      href="images/number_guessing_game_logo.png"
      rel="icon"
      type="images/x-icon"
    />
  </head>
  <body>
    <header class="header">
        <img src="images/number_guessing_game_logo.png" alt="logo" class="logo-image">
        <h1 class="head">Number Guessing Game</h1>
    </header>
    <section class="main-section">
        <p class="para1 font">Guess the Secret Number</p>
        <h2 class="head2" id="guessNumber">?</h2>
        <p class="para2 font">Enter your Number from 1 - 100 to Guess</p>
        <input class="inputData font" id="inputData" maxlength="3" placeholder="123">
        <p class="font error" id="reply"></p>
        <button class="submit" id="goo">Goo</button>
        <p id="error" class="font error"></p>
        <p id="attempts" class=" attempts font">Attempts : 0</p>
        <button class="refresh" id="refresh">New Game</button>
    </section>
    <footer class="footer">
        <p class="trademark">©2025 alenjeeson <br> All rights reserved.</p>
    </footer>
    <script src="index.js"></script>
  </body>
</html>
